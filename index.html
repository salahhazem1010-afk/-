<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>أوقات الصلاة الإسلامية</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1D3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="#0B1D3A">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4AF37;--gold2:#F0D060;--gold3:#A88B20;
  --navy:#0B1D3A;--purple:#1C1F4A;
  --glass:rgba(255,255,255,0.06);--glass2:rgba(255,255,255,0.11);--glass3:rgba(255,255,255,0.17);
  --border:rgba(255,255,255,0.13);--border2:rgba(255,255,255,0.22);
  --text:#fff;--text2:rgba(255,255,255,0.78);--text3:rgba(255,255,255,0.45);
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --nav:72px;--r:20px;--r2:14px;--r3:10px;
}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;background:none;outline:none}
input{font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.3);border-radius:10px}

/* === CANVAS === */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* === CURSOR GLOW === */
#cursor-glow{position:fixed;width:300px;height:300px;border-radius:50%;pointer-events:none;z-index:1;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(212,175,55,0.06) 0%,transparent 70%);transition:opacity 0.3s}

/* === APP === */
#app{position:relative;z-index:2;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(var(--nav)+16px)}

/* === SCREENS === */
.scr{display:none;opacity:0;padding:20px 14px 10px;min-height:calc(100vh - var(--nav))}
.scr.on{display:block;animation:fadeUp .32s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* === GLASS CARD === */
.gc{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:transform .18s ease,background .18s ease,box-shadow .18s ease}
.gc:active{transform:scale(.975)}
.gc.glow:active{box-shadow:0 0 24px rgba(212,175,55,0.25)}
.gc-gold{background:linear-gradient(135deg,rgba(212,175,55,.18) 0%,rgba(212,175,55,.06) 100%);border:1px solid rgba(212,175,55,.3)}

/* === MOUSE PARALLAX wrapper === */
.parallax-card{transform-style:preserve-3d;transform:perspective(800px) rotateX(0deg) rotateY(0deg)}

/* === NAV === */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav);display:flex;align-items:center;justify-content:space-around;background:rgba(8,18,38,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);z-index:100;padding:0 4px 6px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;border-radius:14px;color:var(--text3);transition:all .25s ease}
.nb.on{color:var(--gold)}
.nb .ic{font-size:20px;transition:transform .25s ease}
.nb.on .ic{transform:scale(1.18)}
.nb .lbl{font-size:10px;font-weight:600}
.nb .dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .25s}
.nb.on .dot{opacity:1}

/* === HEADER (reusable) === */
.sh{margin-bottom:22px}
.sh h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.75) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sh p{font-size:12px;color:var(--text3);margin-top:3px}

/* === CLOCK CARD === */
.clk-card{padding:26px 22px;text-align:center;margin-bottom:18px;position:relative;overflow:hidden}
.clk-card::after{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:240px;height:240px;background:radial-gradient(circle,rgba(212,175,55,.13) 0%,transparent 65%);pointer-events:none}
.clk-time{font-size:54px;font-weight:800;letter-spacing:3px;line-height:1;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.8) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-variant-numeric:tabular-nums}
.clk-date{font-size:13px;color:var(--text2);margin-top:8px}
.clk-hijri{font-size:12px;color:var(--gold);margin-top:4px;font-weight:600}
.loc-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;color:var(--text2);font-size:13px}

/* === NEXT PRAYER === */
.np-banner{padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(212,175,55,.2),rgba(212,175,55,.07));border:1px solid rgba(212,175,55,.3);border-radius:18px}
.np-lbl{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:3px}
.np-name{font-size:19px;font-weight:700}
.np-cd{font-size:26px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:1px}

/* === PRAYER LIST === */
.pl{display:flex;flex-direction:column;gap:9px}
.pi{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-radius:16px}
.pi.cur{background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.07));border:1px solid rgba(212,175,55,.38);animation:ppulse 2.8s ease-in-out infinite}
@keyframes ppulse{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0)}50%{box-shadow:0 0 0 7px rgba(212,175,55,.1)}}
.pi-ico{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:17px;margin-left:13px;flex-shrink:0}
.pi.cur .pi-ico{background:rgba(212,175,55,.18)}
.pi-name{font-size:15px;font-weight:600}
.pi.cur .pi-name{color:var(--gold2)}
.pi-en{font-size:11px;color:var(--text3)}
.pi-badge{font-size:9px;background:var(--gold);color:#1a1000;padding:2px 7px;border-radius:20px;font-weight:700;margin-top:2px;display:inline-block}
.pi-time{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.pi.cur .pi-time{color:var(--gold)}

/* === DOWNLOAD/ADHAN BTN === */
.pwa-btn{width:100%;padding:14px;margin-bottom:16px;border-radius:16px;border:1px solid rgba(212,175,55,.6);background:linear-gradient(135deg, rgba(212,175,55,0.25) 0%, rgba(212,175,55,0.08) 100%);color:var(--gold2);font-size:14px;font-weight:700;display:none;align-items:center;justify-content:center;gap:9px;box-shadow:0 0 15px rgba(212,175,55,0.15);transition:all .25s;animation:pulseBtn 2s infinite}
@keyframes pulseBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.02);box-shadow:0 0 20px rgba(212,175,55,0.3)}}
.adhan-btn{width:100%;padding:14px;margin-top:16px;border-radius:16px;border:1px solid rgba(212,175,55,.33);background:rgba(212,175,55,.09);color:var(--gold);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .25s}
.adhan-btn:hover,.adhan-btn:active{background:rgba(212,175,55,.18)}
.adhan-btn.ply{background:rgba(212,175,55,.22);border-color:var(--gold)}

/* === AZKAR CATEGORIES === */
.az-cats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.az-cat{padding:16px 14px;border-radius:16px;text-align:center;cursor:pointer;transition:all .22s ease;position:relative;overflow:hidden}
.az-cat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);border-radius:inherit}
.az-cat .cat-ico{font-size:26px;margin-bottom:6px}
.az-cat .cat-name{font-size:13px;font-weight:700;color:var(--text2)}
.az-cat .cat-count{font-size:11px;color:var(--text3);margin-top:2px}
.az-cat:active{transform:scale(.95)}
.az-cat.sel{border-color:rgba(212,175,55,.5)!important;background:rgba(212,175,55,.13)!important}
.az-cat.sel .cat-name{color:var(--gold)}

/* === ZEKR LIST === */
.zk-list{display:flex;flex-direction:column;gap:11px;margin-top:12px}
.zk{padding:20px 18px;border-radius:18px;position:relative}
.zk-ar Dino{font-family:'Amiri',serif;font-size:19px;line-height:2;color:#fff;text-align:center;margin-bottom:8px}
.zk-tr{font-size:11px;color:var(--text3);text-align:center;margin-bottom:12px;font-style:italic}
.zk-src{font-size:10px;color:rgba(212,175,55,.7);text-align:center;margin-bottom:12px}
.zk-row{display:flex;align-items:center;justify-content:space-between}
.zk-tgt{font-size:11px;color:var(--text3)}
.cnt-grp{display:flex;align-items:center;gap:10px}
.cnt-num{font-size:22px;font-weight:800;color:var(--gold);min-width:38px;text-align:center;font-variant-numeric:tabular-nums;transition:transform .15s ease}
.cnt-num.pop{animation:numPop .2s ease}
@keyframes numPop{0%{transform:scale(1.4)}100%{transform:scale(1)}}
.cnt-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(212,175,55,.38);background:rgba(212,175,55,.09);color:var(--gold);font-size:21px;display:flex;align-items:center;justify-content:center;transition:all .17s ease;user-select:none;-webkit-user-select:none}
.cnt-btn:active{transform:scale(.88);background:rgba(212,175,55,.25)}
.cnt-rst{font-size:10px;color:var(--text3);padding:3px 7px;border-radius:7px;background:rgba(255,255,255,.05)}
.zk-prog{height:3px;background:rgba(255,255,255,.08);border-radius:10px;margin-top:11px;overflow:hidden}
.zk-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold2));border-radius:10px;transition:width .3s ease}
.zk-done{color:#4ade80!important}

/* === TASBIH === */
.tsb-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 20px}
.tsb-screen{width:200px;height:80px;background:rgba(0,0,0,.3);border:1px solid rgba(212,175,55,.25);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:24px}
.tsb-num{font-size:44px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1;transition:transform .12s ease}
.tsb-sub{font-size:11px;color:var(--text3);margin-top:2px}
.tsb-circle{width:190px;height:190px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(212,175,55,.22) 0%,rgba(212,175,55,.07) 50%,rgba(0,0,0,.2) 100%);border:2px solid rgba(212,175,55,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s ease;position:relative;box-shadow:0 8px 32px rgba(212,175,55,.15),inset 0 2px 4px rgba(255,255,255,.08);margin-bottom:20px;user-select:none;-webkit-user-select:none}
.tsb-circle::before{content:'';position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle at 40% 30%,rgba(255,255,255,.1),transparent 60%);pointer-events:none}
.tsb-circle:active{transform:scale(.93);box-shadow:0 4px 16px rgba(212,175,55,.25)}
.tsb-circle .tc-inner{font-size:32px;font-weight:800;color:var(--gold2);text-align:center;line-height:1.2}
.tsb-circle .tc-lbl{font-size:12px;color:var(--text2);margin-top:4px}
.tsb-controls{display:flex;gap:12px;width:100%}
.tsb-ctrl{flex:1;padding:12px;border-radius:13px;background:var(--glass);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;transition:all .2s}
.tsb-ctrl:active{transform:scale(.95);background:var(--glass2)}
.tsb-target-row{display:flex;align-items:center;gap:12px;width:100%;margin-top:12px}
.tsb-target-row label{font-size:12px;color:var(--text3)}
.tsb-target-row input{flex:1;padding:10px 14px;border-radius:11px;background:var(--glass);border:1px solid var(--border);color:#fff;font-size:14px;text-align:center}
.tsb-prog-outer{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:10px;margin-top:16px;overflow:hidden}
.tsb-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold2));border-radius:10px;transition:width .35s ease}

/* === QURAN === */
.qr-reader-sel{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.qr-reader-sel label{font-size:12px;color:var(--text3);white-space:nowrap}
.qr-reader-sel select{flex:1;padding:10px 14px;border-radius:11px;background:rgba(10,20,42,.85);border:1px solid var(--border);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;min-width:0}
.qr-reader-sel select option{background:#0e1e3a}
.su-item{padding:13px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;border-radius:15px;transition:all .22s}
.su-item:active{transform:scale(.98)}
.su-num{width:38px;height:38px;border-radius:10px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.su-info{flex:1}
.su-ar{font-size:17px;font-weight:700}
.su-en{font-size:11px;color:var(--text3);margin-top:1px}
.su-meta{font-size:10px;color:var(--text3);text-align:left;direction:ltr}
.load-more{width:100%;padding:13px;margin-top:10px;border-radius:13px;border:1px solid var(--border);background:var(--glass);color:var(--text2);font-size:13px;font-weight:600;transition:all .22s}
.load-more:active{background:var(--glass2)}

/* === SURAH READER OVERLAY === */
#reader{display:none;position:fixed;inset:0;z-index:300;background:rgba(6,12,28,.97);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);flex-direction:column}
#reader.open{display:flex;animation:fadeUp .3s ease}
.rdr-hdr{position:sticky;top:0;background:rgba(10,18,38,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:10;flex-shrink:0}
.rdr-back{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--glass);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rdr-hdr-info{flex:1;min-width:0}
.rdr-title{font-size:18px;font-weight:700}
.rdr-sub{font-size:11px;color:var(--text3)}
.rdr-actions{display:flex;gap:8px;flex-shrink:0}
.rdr-act-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--glass);color:var(--text2);font-size:12px;font-weight:600;transition:all .2s}
.rdr-act-btn.ply{border-color:rgba(212,175,55,.4);color:var(--gold);background:rgba(212,175,55,.09)}
.rdr-act-btn:active{transform:scale(.95)}
.rdr-body{flex:1;overflow-y:auto;padding:22px 18px 40px}
.bismillah{text-align:center;font-family:'Amiri',serif;font-size:24px;color:var(--gold);margin-bottom:28px;padding:18px;border-bottom:1px solid rgba(212,175,55,.18);line-height:2}
.ay-wrap{margin-bottom:18px}
.ay-txt{font-family:'Amiri',serif;font-size:21px;line-height:2.3;text-align:justify;direction:rtl;color:#fff}
.ay-n{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(212,175,55,.18);border:1px solid rgba(212,175,55,.28);font-size:10px;font-weight:700;color:var(--gold);margin:0 3px;vertical-align:middle;font-family:'Cairo',sans-serif}
.audio-bar{padding:14px 16px;background:rgba(10,18,38,.9);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.audio-prog{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;cursor:pointer}
.audio-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold2));border-radius:10px;transition:width .3s linear}
.audio-time{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;min-width:42px;text-align:right}
.audio-ply-btn{width:40px;height:40px;border-radius:50%;background:rgba(212,175,55,.18);border:1px solid rgba(212,175,55,.35);color:var(--gold);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* === TRACKER === */
.trk-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px}
.trk-day{display:flex;flex-direction:column;align-items:center;gap:5px}
.trk-day-lbl{font-size:9px;color:var(--text3);font-weight:600}
.trk-day-dot{width:32px;height:32px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);position:relative;cursor:pointer;transition:all .2s;font-weight:600}
.trk-day-dot.today{border-color:rgba(212,175,55,.5);color:var(--gold)}
.trk-day-dot .dd-inner{position:absolute;inset:3px;border-radius:50%;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:1px}
.dd-cell{background:rgba(255,255,255,.04);border-radius:1px;transition:background .2s}
.dd-cell.done{background:var(--green)}
.dd-cell.missed{background:var(--red)}
.trk-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.trk-stat{padding:14px 12px;border-radius:14px;text-align:center}
.trk-stat-n{font-size:28px;font-weight:800;margin-bottom:3px}
.trk-stat-l{font-size:11px;color:var(--text3)}
.trk-table{border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.trk-thead{display:grid;grid-template-columns:1fr repeat(5,1fr);background:rgba(212,175,55,.1);padding:10px 14px;font-size:11px;font-weight:700;color:var(--gold);gap:4px}
.trk-row{display:grid;grid-template-columns:1fr repeat(5,1fr);padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);gap:4px;align-items:center;transition:background .15s}
.trk-row:hover{background:rgba(255,255,255,.03)}
.trk-row:active{background:rgba(255,255,255,.05)}
.trk-label{font-size:13px;font-weight:600;color:var(--text2)}
.trk-cell{display:flex;align-items:center;justify-content:center}
.trk-cb{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:13px}
.trk-cb.done{background:rgba(74,222,128,.2);border-color:rgba(74,222,128,.5)}
.trk-cb.missed{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.35)}

/* === LOADING / ERROR === */
.ld-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:14px}
.spin{width:38px;height:38px;border:3px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{font-size:13px;color:var(--text3)}
.err{padding:22px;text-align:center;border-radius:16px;background:rgba(255,60,60,.07);border:1px solid rgba(255,60,60,.18);color:rgba(255,160,160,.9);font-size:13px;line-height:1.6}
.err button{margin-top:10px;padding:9px 20px;border-radius:11px;border:1px solid rgba(212,175,55,.3);background:rgba(212,175,55,.09);color:var(--gold);font-size:13px}

/* === RIPPLE === */
.rp{position:relative;overflow:hidden}
.rp-wave{position:absolute;border-radius:50%;transform:scale(0);animation:rpanim .5s linear;background:rgba(255,255,255,.12);pointer-events:none}
@keyframes rpanim{to{transform:scale(4);opacity:0}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="cursor-glow"></div>

<div id="app">

<div id="s-home" class="scr on">
  <div class="loc-bar"><span>📍</span><span id="loc-name">جارٍ تحديد الموقع...</span></div>
  
  <button id="pwa-install-btn" class="pwa-btn" onclick="triggerPwaInstall()">📥 تحميل التطبيق على الهاتف</button>

  <div class="gc gc-gold clk-card parallax-card" id="clk-card">
    <div class="clk-time" id="clk-t">--:--:--</div>
    <div class="clk-date" id="clk-d">---</div>
    <div class="clk-hijri" id="clk-h">التاريخ الهجري...</div>
  </div>
  <div class="np-banner">
    <div><div class="np-lbl">الصلاة القادمة</div><div class="np-name" id="np-name">---</div></div>
    <div class="np-cd" id="np-cd">--:--:--</div>
